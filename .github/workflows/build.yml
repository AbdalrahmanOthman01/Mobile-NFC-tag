name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            .buildozer-global
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ steps.get-date.outputs.date }}

      - name: Install Rust and Cargo via rustup (with Android targets)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Load cargo environment for the current step to register targets
          . "$HOME/.cargo/env"
          rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Build with Buildozer
        run: |
          # Fix ownership of cached directories to prevent permission errors
          sudo chown -R $(id -u):$(id -g) . 2>/dev/null || true
          mkdir -p .buildozer-global
          sudo chown -R $(id -u):$(id -g) .buildozer-global 2>/dev/null || true
          # Symlink for root user home
          sudo rm -rf /root/.buildozer
          sudo ln -sf $(pwd)/.buildozer-global /root/.buildozer
          # Symlink for GHA home /github/home
          sudo mkdir -p /github/home
          sudo rm -rf /github/home/.buildozer
          sudo ln -sf $(pwd)/.buildozer-global /github/home/.buildozer
          sudo chown -R $(id -u):$(id -g) /github/home 2>/dev/null || true
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfcvault-apk
          path: bin/*.apk
