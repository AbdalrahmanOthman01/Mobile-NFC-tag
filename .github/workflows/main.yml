name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            .buildozer-global
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ steps.get-date.outputs.date }}

      - name: Build with Buildozer
        run: |
          mkdir -p .buildozer-global
          rm -rf /root/.buildozer
          ln -sf $(pwd)/.buildozer-global /root/.buildozer
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfcvault-apk
          path: bin/*.apk
